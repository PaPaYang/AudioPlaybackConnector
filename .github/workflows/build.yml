name: Build C++ App

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build the solution
      run: msbuild AudioPlaybackConnector.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload EXE file
      uses: actions/upload-artifact@v4
      with:
        name: AudioPlaybackConnector-Modified
        path: x64/Release/*.exe
